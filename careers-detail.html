<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Careers | SUNJIN VIETNAM</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit','sans-serif'], display: ['Jost','sans-serif'] },
                    colors: { dark: '#0a0a0a', light: '#f5f5f5', accent: '#888888' }
                }
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #f5f5f5; cursor: none; overflow-x: hidden; font-family: 'Outfit', sans-serif; }

        @media (hover: none), (pointer: coarse) { .cursor-dot, .cursor-outline { display: none !important; } }
        .cursor-dot, .cursor-outline { position: fixed; top: 0; left: 0; transform: translate(-50%,-50%); border-radius: 50%; z-index: 9999; pointer-events: none; }
        .cursor-dot { width: 8px; height: 8px; background-color: white; mix-blend-mode: difference; transition: width 0.2s, height 0.2s; }
        .cursor-outline { width: 40px; height: 40px; border: 1px solid white; mix-blend-mode: difference; transition: width 0.2s, height 0.2s; }
        .cursor-hover .cursor-dot { width: 0; height: 0; }
        .cursor-hover .cursor-outline { width: 60px; height: 60px; background-color: rgba(255,255,255,0.1); backdrop-filter: blur(2px); }

        .detail-left { position: fixed; top: 0; left: 0; width: 50%; height: 100vh; overflow: hidden; z-index: 10; }
        .detail-left img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }
        .detail-left-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(5,5,5,0.88) 0%, rgba(5,5,5,0.35) 50%, rgba(5,5,5,0.15) 100%); }
        .detail-left-content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 2.5rem; }

        .close-btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'Outfit', sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.25em; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.3); padding: 8px 18px; border-radius: 4px; background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); transition: background 0.25s ease, border-color 0.25s ease; cursor: pointer; width: fit-content; }
        .close-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.6); }

        .detail-right { margin-left: 50%; min-height: 100vh; background: #0a0a0a; padding: 4rem 3rem 6rem; border-left: 1px solid rgba(255,255,255,0.08); }

        .accordion-header { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 1.4rem 0; border-top: 1px solid rgba(255,255,255,0.1); background: none; cursor: pointer; color: white; text-align: left; }
        .accordion-wrapper:last-of-type .accordion-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .accordion-title { font-family: 'Outfit', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 0.28em; color: white; }
        .accordion-chevron { flex-shrink: 0; transition: transform 0.35s ease; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1); }
        .accordion-content.open { max-height: 2000px; }
        .accordion-inner { padding: 0.5rem 0 2rem; }

        .content-section-title { font-family: 'Outfit', sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.28em; color: rgba(255,255,255,0.45); margin-bottom: 1rem; margin-top: 1.6rem; }
        .content-section-title:first-child { margin-top: 0; }
        .content-list { list-style: none; padding: 0; }
        .content-list li { font-family: 'Outfit', sans-serif; font-size: 13px; color: rgba(245,245,245,0.65); line-height: 1.8; padding: 0.3rem 0 0.3rem 1.2rem; position: relative; }
        .content-list li::before { content: '·'; position: absolute; left: 0; color: rgba(255,255,255,0.3); }

        .apply-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.15); padding: 0.75rem 0; font-family: 'Outfit', sans-serif; font-size: 13px; color: white; outline: none; transition: border-color 0.25s ease; }
        .apply-input::placeholder { color: rgba(255,255,255,0.3); }
        .apply-input:focus { border-bottom-color: rgba(255,255,255,0.55); }
        .upload-btn { display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 10px 18px; font-family: 'Outfit', sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.25s ease; background: none; width: 100%; }
        .upload-btn:hover { border-color: rgba(255,255,255,0.45); color: rgba(255,255,255,0.85); }
        .submit-btn { width: 100%; background: white; color: #0a0a0a; border: none; padding: 14px 24px; font-family: 'Outfit', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 0.25em; cursor: pointer; border-radius: 4px; transition: background 0.25s ease, opacity 0.25s ease; margin-top: 1.5rem; }
        .submit-btn:hover { background: rgba(245,245,245,0.88); }

        @media (max-width: 768px) {
            .detail-left { position: relative; width: 100%; height: 60vh; }
            .detail-right { margin-left: 0; padding: 2.5rem 1.5rem 5rem; border-left: none; border-top: 1px solid rgba(255,255,255,0.08); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-dark">

    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <!-- LEFT PANEL -->
    <div class="detail-left">
        <img id="left-img" src="" alt="">
        <div class="detail-left-overlay"></div>
        <div class="detail-left-content">
            <a href="careers.html" class="close-btn">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                Close
            </a>
            <div>
                <p class="font-sans text-[10px] uppercase tracking-[0.3em] text-white/45 mb-4">Open Position</p>
                <h1 id="job-title-h1" class="font-display font-light text-white leading-[1.1]" style="font-size: clamp(2rem, 4.5vw, 3.5rem);"></h1>
            </div>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="detail-right">

        <!-- Meta -->
        <div class="grid grid-cols-2 gap-0 mb-8">
            <div class="py-5 border-b border-white/10">
                <p class="font-sans text-[10px] uppercase tracking-[0.25em] text-white/30 mb-2">Level</p>
                <p id="meta-level" class="font-display font-light text-white text-lg"></p>
            </div>
            <div class="py-5 border-b border-white/10 pl-6">
                <p class="font-sans text-[10px] uppercase tracking-[0.25em] text-white/30 mb-2">Salary</p>
                <p id="meta-salary" class="font-display font-light text-white text-lg"></p>
            </div>
            <div class="py-5 border-b border-white/10 pr-6">
                <div class="flex items-center gap-2 mb-2">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-white/30"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    <p class="font-sans text-[10px] uppercase tracking-[0.25em] text-white/30">Deadline</p>
                </div>
                <p class="font-sans text-sm text-white/70">Closes in <strong id="meta-deadline" class="text-white font-medium"></strong></p>
            </div>
            <div class="py-5 border-b border-white/10 pl-6">
                <p class="font-sans text-[10px] uppercase tracking-[0.25em] text-white/30 mb-2">Division</p>
                <p id="meta-division" class="font-sans text-sm text-white/70"></p>
                <p id="meta-location" class="font-sans text-sm text-white/45 mt-0.5"></p>
            </div>
        </div>

        <!-- Accordion: Job Description -->
        <div class="accordion-wrapper">
            <button class="accordion-header" onclick="toggleAccordion(this)">
                <span class="accordion-title">Job Description</span>
                <svg class="accordion-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 15l-6-6-6 6"/></svg>
            </button>
            <div class="accordion-content open">
                <div class="accordion-inner" id="desc-content"></div>
            </div>
        </div>

        <!-- Accordion: Requirements -->
        <div class="accordion-wrapper">
            <button class="accordion-header" onclick="toggleAccordion(this)">
                <span class="accordion-title">Requirements</span>
                <svg class="accordion-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="accordion-content">
                <div class="accordion-inner" id="req-content"></div>
            </div>
        </div>

        <!-- Accordion: Benefits -->
        <div class="accordion-wrapper">
            <button class="accordion-header" onclick="toggleAccordion(this)">
                <span class="accordion-title">Benefits</span>
                <svg class="accordion-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="accordion-content">
                <div class="accordion-inner" id="benefits-content"></div>
            </div>
        </div>

        <!-- Application Form -->
        <div class="mt-12 pt-10 border-t border-white/8">
            <p class="font-sans text-[10px] uppercase tracking-[0.3em] text-white/30 mb-1">Apply for this position</p>
            <h2 class="font-display font-light text-white mb-8" style="font-size: clamp(1.5rem, 3vw, 2.2rem);">Send your application.</h2>
            <form class="flex flex-col gap-5" onsubmit="handleSubmit(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <input type="text" placeholder="Full Name (Required)" class="apply-input" required>
                    <input type="email" placeholder="Email Address (Required)" class="apply-input" required>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <input type="tel" placeholder="Phone Number (Required)" class="apply-input" required>
                    <input type="text" placeholder="Years of Experience" class="apply-input">
                </div>
                <textarea placeholder="Tell us about yourself and why you're a good fit for this role..." rows="4" class="apply-input resize-none" style="padding-top: 0.75rem;"></textarea>
                <label class="upload-btn" for="cv-upload">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    <span id="upload-label">Upload CV / Portfolio (PDF, max 15MB)</span>
                </label>
                <input type="file" id="cv-upload" accept=".pdf,.jpg,.png" class="hidden" onchange="updateUploadLabel(this)">
                <button type="submit" class="submit-btn">Submit Application</button>
            </form>
            <p class="font-sans text-[10px] text-white/20 mt-5 leading-relaxed">
                By submitting this form you agree to SUNJIN VIETNAM processing your personal data for recruitment purposes.
            </p>
        </div>

        <!-- Back link -->
        <div class="mt-16 pt-8 border-t border-white/8">
            <a href="careers.html" class="inline-flex items-center gap-3 font-sans text-[11px] uppercase tracking-[0.25em] text-white/35 hover:text-white transition-colors">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                All Open Positions
            </a>
        </div>

    </div>

    <script>
    // ── Helpers ───────────────────────────────────────────────────────────────────────────────
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    const DEPT_LABEL = {design:'Design Division',interior:'Interior Design Division',urbanplan:'Urban Plan Division',construction:'Construction Division',general:'General Affairs'};
    const LOC_LABEL  = {hanoi:'Hanoi, Vietnam',danang:'Da Nang, Vietnam',hcm:'Ho Chi Minh City, Vietnam',phuquoc:'Phu Quoc, Vietnam'};
    const LVL_LABEL  = {entry:'Entry',intermediate:'Intermediate',expert:'Expert'};

    function buildList(text) {
        const t = String(text || '').trim();
        if (!t) return '';
        return '<ul class="content-list">' + t.split('\n').filter(l => l.trim()).map(l => '<li>' + esc(l.trim()) + '</li>').join('') + '</ul>';
    }

    function buildBenefits(items) {
        if (!Array.isArray(items) || !items.length) return '';
        return '<ul class="content-list">' + items.map(i => '<li>' + esc(i) + '</li>').join('') + '</ul>';
    }

    function populate(meta) {
        document.title = (meta.title || '') + ' | Careers | SUNJIN VIETNAM';

        const img = document.getElementById('left-img');
        if (meta.coverImage) { img.src = meta.coverImage; img.alt = meta.title || ''; }
        else { img.style.display = 'none'; }

        document.getElementById('job-title-h1').textContent = meta.title || '';
        document.getElementById('meta-level').textContent    = LVL_LABEL[meta.level]      || meta.level      || '';
        document.getElementById('meta-salary').textContent   = meta.salary || 'Negotiating';
        document.getElementById('meta-deadline').textContent = meta.deadline || '';
        document.getElementById('meta-division').textContent = DEPT_LABEL[meta.department] || meta.department || '';
        document.getElementById('meta-location').textContent = LOC_LABEL[meta.location]    || meta.location   || '';

        document.getElementById('desc-content').innerHTML     = buildList(meta.description);
        document.getElementById('req-content').innerHTML      = buildList(meta.requirements);
        document.getElementById('benefits-content').innerHTML = buildBenefits(meta.benefits);
    }

    const id = new URLSearchParams(window.location.search).get('id') || '';

    (function loadJob() {
        try {
            const arr = JSON.parse(localStorage.getItem('sj_careers') || '[]');
            const meta = arr.find(c => c.id === id);
            if (meta) { populate(meta); return; }
        } catch(e) {}
        document.getElementById('job-title-h1').textContent = 'Position not found.';
    })();

    // ── Custom cursor ─────────────────────────────────────────────────
    const dot = document.getElementById('cursor-dot'), outline = document.getElementById('cursor-outline');
    window.addEventListener('mousemove', e => { dot.style.left=`${e.clientX}px`; dot.style.top=`${e.clientY}px`; outline.animate({left:`${e.clientX}px`,top:`${e.clientY}px`},{duration:500,fill:'forwards'}); });
    document.querySelectorAll('a,button,label,input,textarea').forEach(el => { el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-hover')); el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-hover')); });

    // ── Accordion ─────────────────────────────────────────────────────
    function toggleAccordion(btn) {
        const content = btn.nextElementSibling;
        const chevron = btn.querySelector('.accordion-chevron');
        const isOpen = content.classList.contains('open');
        document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('open'));
        document.querySelectorAll('.accordion-chevron').forEach(ch => ch.style.transform = 'rotate(0deg)');
        if (!isOpen) {
            content.classList.add('open');
            chevron.style.transform = 'rotate(180deg)';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const firstChevron = document.querySelector('.accordion-header .accordion-chevron');
        if (firstChevron) firstChevron.style.transform = 'rotate(180deg)';
    });

    // ── File upload label ─────────────────────────────────────────────
    function updateUploadLabel(input) {
        document.getElementById('upload-label').textContent = input.files[0]
            ? input.files[0].name
            : 'Upload CV / Portfolio (PDF, max 15MB)';
    }

    // ── Form submit ───────────────────────────────────────────────────
    function handleSubmit(e) {
        e.preventDefault();
        const btn = e.target.querySelector('.submit-btn');
        btn.textContent = 'Application Sent ✓';
        btn.style.background = 'rgba(255,255,255,0.15)';
        btn.style.color = 'white';
        btn.style.border = '1px solid rgba(255,255,255,0.3)';
        btn.disabled = true;
    }
    </script>
</body>
</html>
